<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CloudGame 2048 V2</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:40px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.header{
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  margin-bottom:25px;
}

h1{
  margin:0 0 10px;
}

button{
  border:none;
  padding:10px 16px;
  cursor:pointer;
  border-radius:7px;
  font-weight:bold;
  margin:4px;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.create{
  background:#ff9900;
  color:white;
}

.refresh{
  background:#555;
  color:white;
}

.play{
  background:#1673ff;
  color:white;
}

.stop{
  background:#d13212;
  color:white;
}

.delete{
  background:#444;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:22px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.status{
  font-weight:bold;
  margin:10px 0;
}

.url{
  font-size:13px;
  color:#555;
  word-break:break-all;
}

.empty{
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🎮 CloudGame 2048</h1>
    <p>Plateforme de création de serveurs de jeux à la demande sur AWS.</p>
    <p><strong id="count">0</strong> serveur(s) provisionné(s)</p>

    <button class="create" onclick="createServer()">Créer un serveur</button>
    <button class="refresh" onclick="loadServers()">Actualiser</button>
  </div>

  <div id="servers" class="grid"></div>

</div>

<script>
const API = "https://u81b3h1eo2.execute-api.us-east-1.amazonaws.com/prod";

function getContainerName(server){
  return server.containerName || server.name;
}

async function createServer(){
  await fetch(API + "/server", { method:"POST" });
  await loadServers();
}

async function loadServers(){
  const response = await fetch(API + "/servers");
  const data = await response.json();
  const servers = data.body ? JSON.parse(data.body) : data;

  document.getElementById("count").innerText = servers.length;

  const container = document.getElementById("servers");
  container.innerHTML = "";

  if(servers.length === 0){
    container.innerHTML = `
      <div class="empty">
        Aucun serveur créé pour le moment.
      </div>
    `;
    return;
  }

  servers.forEach(server => {
    const containerName = getContainerName(server);
    const isValidContainer = containerName && containerName.startsWith("game2048-");
    const running = server.status === "RUNNING";
    const icon = running ? "🟢" : "🔴";
    const label = running ? "RUNNING" : "STOPPED";
    const playText = running ? "Jouer" : "Démarrer & jouer";

    container.innerHTML += `
      <div class="card">
        <h2>🎲 ${containerName || "Serveur inconnu"}</h2>

        <div class="status">${icon} ${label}</div>

        <p><strong>Jeu :</strong> ${server.game || "2048"}</p>
        <p><strong>Port :</strong> ${server.port || "Non défini"}</p>
        <p class="url">${server.url || "URL non disponible"}</p>

        <button class="play"
          onclick="playServer('${containerName}', '${server.url}', '${server.status}')"
          ${isValidContainer && server.url ? "" : "disabled"}>
          ${playText}
        </button>

        <button class="stop"
          onclick="stopContainer('${containerName}')"
          ${isValidContainer && running ? "" : "disabled"}>
          Arrêter
        </button>

        <button class="delete"
          onclick="deleteContainer('${containerName}')"
          ${isValidContainer ? "" : "disabled"}>
          Supprimer
        </button>
      </div>
    `;
  });
}

async function playServer(name, url, status){
  if(!name || name === "undefined"){
    alert("Nom du conteneur introuvable.");
    return;
  }

  if(status === "STOPPED"){
    await fetch(API + "/server/start/" + encodeURIComponent(name), {
      method:"POST"
    });

    await loadServers();

    setTimeout(() => {
      window.open(url, "_blank");
    }, 1500);
  } else {
    window.open(url, "_blank");
  }
}

async function stopContainer(name){
  if(!name || name === "undefined"){
    alert("Nom du conteneur introuvable.");
    return;
  }

  await fetch(API + "/server/stop/" + encodeURIComponent(name), {
    method:"POST"
  });

  await loadServers();
}

async function deleteContainer(name){
  if(!name || name === "undefined"){
    alert("Nom du conteneur introuvable.");
    return;
  }

  if(!confirm("Supprimer ce serveur ?")) return;

  await fetch(API + "/server/delete/" + encodeURIComponent(name), {
    method:"DELETE"
  });

  await loadServers();
}

loadServers();
setInterval(loadServers, 5000);
</script>

</body>
</html>
